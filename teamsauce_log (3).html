<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TeamSauce Archive</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-primary:        #313338;
    --bg-secondary:      #2b2d31;
    --bg-tertiary:       #1e1f22;
    --bg-hover:          #35373c;
    --bg-msg-hover:      #2e3035;
    --bg-selected:       #404249;
    --text-primary:      #dbdee1;
    --text-muted:        #949ba4;
    --text-header:       #f2f3f5;
    --text-link:         #00a8fc;
    --accent:            #5865f2;
    --border:            #1e1f22;
    --mention-bg:        rgba(88,101,242,.15);
    --mention-text:      #c9cdfb;
    --scrollbar-thumb:   #3d4045;
    --sidebar-w:         240px;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans', sans-serif;
    background: var(--bg-primary);
    color: var(--text-primary);
    height: 100vh;
    display: flex;
    overflow: hidden;
  }

  /* ───── SIDEBAR ───── */
  #sidebar {
    width: var(--sidebar-w);
    background: var(--bg-secondary);
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
    overflow: hidden;
  }

  .server-header {
    padding: 0 16px;
    height: 48px;
    display: flex;
    align-items: center;
    border-bottom: 1px solid var(--border);
    font-weight: 700;
    font-size: 15px;
    color: var(--text-header);
    gap: 10px;
    flex-shrink: 0;
  }
  .server-header img {
    width: 24px; height: 24px;
    border-radius: 50%;
    object-fit: cover;
  }

  .sidebar-scroll {
    flex: 1;
    overflow-y: auto;
    padding: 8px 8px 16px;
  }
  .sidebar-scroll::-webkit-scrollbar { width: 4px; }
  .sidebar-scroll::-webkit-scrollbar-thumb { background: var(--scrollbar-thumb); border-radius: 2px; }

  .channel-category {
    margin-top: 16px;
    margin-bottom: 4px;
    padding: 0 8px;
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: .05em;
    color: var(--text-muted);
    display: flex;
    align-items: center;
    gap: 4px;
    cursor: default;
    user-select: none;
  }

  .channel-item {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 5px 8px;
    border-radius: 4px;
    cursor: pointer;
    color: var(--text-muted);
    font-size: 15px;
    transition: background .1s, color .1s;
    user-select: none;
  }
  .channel-item:hover { background: var(--bg-hover); color: var(--text-primary); }
  .channel-item.active { background: var(--bg-selected); color: var(--text-header); }
  .channel-item .hash { font-size: 18px; line-height: 1; opacity: .6; }
  .channel-item .ch-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  .log-pills {
    display: none;
    flex-direction: column;
    gap: 2px;
    padding-left: 28px;
    margin-top: 2px;
  }
  .channel-item.active + .log-pills,
  .log-pills.open { display: flex; }
  .log-pill {
    padding: 3px 8px;
    border-radius: 4px;
    font-size: 12px;
    color: var(--text-muted);
    cursor: pointer;
    transition: background .1s, color .1s;
  }
  .log-pill:hover { background: var(--bg-hover); color: var(--text-primary); }
  .log-pill.active { background: var(--accent); color: #fff; }

  /* ───── MAIN ───── */
  #main {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-width: 0;
    overflow: hidden;
  }

  /* Top bar */
  .topbar {
    height: 48px;
    padding: 0 16px;
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--bg-primary);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    box-shadow: 0 1px 0 rgba(0,0,0,.3);
  }
  .topbar .hash { font-size: 20px; font-weight: 700; color: var(--text-muted); }
  .topbar .ch-title { font-size: 15px; font-weight: 700; color: var(--text-header); }
  .topbar .divider { width: 1px; height: 22px; background: rgba(255,255,255,.12); margin: 0 8px; }
  .topbar .log-label { font-size: 13px; color: var(--text-muted); }
  .topbar .badge {
    margin-left: auto;
    font-size: 11px;
    padding: 2px 8px;
    background: var(--bg-tertiary);
    border-radius: 4px;
    color: var(--text-muted);
    border: 1px solid rgba(255,255,255,.05);
    white-space: nowrap;
  }

  /* Messages */
  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 16px 0 24px;
  }
  #messages::-webkit-scrollbar { width: 8px; }
  #messages::-webkit-scrollbar-track { background: var(--bg-tertiary); }
  #messages::-webkit-scrollbar-thumb { background: var(--scrollbar-thumb); border-radius: 4px; }

  /* Date separator */
  .date-sep {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 16px 16px 8px;
    font-size: 12px;
    font-weight: 600;
    color: var(--text-muted);
  }
  .date-sep::before, .date-sep::after {
    content: '';
    flex: 1;
    height: 1px;
    background: rgba(255,255,255,.07);
  }

  /* Group (first msg from user in a run) */
  .msg-group {
    display: flex;
    padding: 16px 16px 0;
    gap: 16px;
  }
  .msg-group:hover { background: var(--bg-msg-hover); }

  /* Continuation */
  .msg-cont {
    padding: 2px 16px 2px 72px;
    position: relative;
    min-height: 22px;
  }
  .msg-cont:hover { background: var(--bg-msg-hover); }
  .msg-cont .ts-small {
    position: absolute;
    left: 16px;
    top: 50%;
    transform: translateY(-50%);
    width: 44px;
    text-align: right;
    font-size: 10px;
    color: var(--text-muted);
    opacity: 0;
    white-space: nowrap;
    transition: opacity .1s;
  }
  .msg-cont:hover .ts-small { opacity: 1; }

  /* Avatar */
  .avatar {
    width: 40px; height: 40px;
    border-radius: 50%;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    font-weight: 700;
    color: #fff;
    user-select: none;
    cursor: default;
  }

  /* Header row */
  .msg-header { display: flex; align-items: baseline; gap: 8px; margin-bottom: 4px; }
  .msg-header .author { font-size: 15px; font-weight: 600; }
  .msg-header .ts { font-size: 11px; color: var(--text-muted); }

  /* Body */
  .msg-body {
    font-size: 15px;
    line-height: 1.375;
    color: var(--text-primary);
    word-break: break-word;
    white-space: pre-wrap;
  }
  .msg-body a { color: var(--text-link); text-decoration: none; }
  .msg-body a:hover { text-decoration: underline; }
  .mention { background: var(--mention-bg); color: var(--mention-text); padding: 0 2px; border-radius: 3px; font-weight: 500; }
  .ch-ref  { background: var(--mention-bg); color: var(--mention-text); padding: 0 2px; border-radius: 3px; }

  /* Attachments */
  .att-grid { margin-top: 6px; display: flex; flex-wrap: wrap; gap: 4px; }
  .att-grid img {
    max-width: min(520px, 80vw);
    max-height: 360px;
    border-radius: 4px;
    object-fit: contain;
    background: #000;
    cursor: zoom-in;
    display: block;
  }

  /* System message */
  .msg-sys {
    display: flex;
    align-items: center;
    padding: 4px 16px;
    font-size: 13px;
    color: #72767d;
    gap: 10px;
  }
  .msg-sys:hover { background: var(--bg-msg-hover); }
  .msg-sys .sys-ts { margin-left: auto; font-size: 11px; }

  /* Loading / error */
  #loading {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    gap: 12px;
    color: var(--text-muted);
    font-size: 14px;
  }
  .spinner {
    width: 36px; height: 36px;
    border: 3px solid rgba(255,255,255,.1);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin .7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Jump button */
  #jump-btn {
    position: fixed;
    bottom: 24px; right: 24px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 24px;
    padding: 8px 16px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    box-shadow: 0 4px 12px rgba(0,0,0,.4);
    opacity: 0;
    transform: translateY(12px);
    transition: opacity .2s, transform .2s;
    pointer-events: none;
    z-index: 50;
  }
  #jump-btn.visible { opacity: 1; transform: none; pointer-events: auto; }

  /* Fake input */
  .fake-input {
    flex-shrink: 0;
    padding: 0 16px 16px;
    background: var(--bg-primary);
  }
  .fake-input-inner {
    background: #383a40;
    border-radius: 8px;
    padding: 11px 16px;
    color: var(--text-muted);
    font-size: 15px;
  }

  /* Lightbox */
  #lightbox {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,.85);
    z-index: 1000;
    align-items: center;
    justify-content: center;
    cursor: zoom-out;
  }
  #lightbox.open { display: flex; }
  #lightbox img { max-width: 90vw; max-height: 90vh; border-radius: 4px; }

  /* Mobile */
  @media (max-width: 600px) {
    :root { --sidebar-w: 200px; }
    .att-grid img { max-width: 90vw; }
  }
</style>
</head>
<body>

<!-- SIDEBAR -->
<div id="sidebar">
  <div class="server-header">
    <img src="https://www.guilded.gg/asset/TeamPage/Avatars/default-team-avatar-s@2x.png" alt="">
    TeamSauce
  </div>
  <div class="sidebar-scroll" id="sidebar-content">
    <!-- dynamically populated -->
  </div>
</div>

<!-- MAIN -->
<div id="main">
  <div class="topbar">
    <span class="hash">#</span>
    <span class="ch-title" id="tb-channel">—</span>
    <span class="divider"></span>
    <span class="log-label" id="tb-log">Select a channel</span>
    <span class="badge" id="tb-badge"></span>
  </div>

  <div id="messages">
    <div id="loading" style="color:var(--text-muted);font-size:14px;display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:8px;">
      <span style="font-size:2rem">💬</span>
      <span>Select a channel to view logs</span>
    </div>
  </div>

  <div class="fake-input">
    <div class="fake-input-inner" id="fake-input-text">Choose a channel from the sidebar</div>
  </div>
</div>

<button id="jump-btn" onclick="jumpToBottom()">↓ Jump to Present</button>

<div id="lightbox" onclick="this.classList.remove('open')">
  <img id="lightbox-img" src="" alt="">
</div>

<script>
// ── Data manifest ──────────────────────────────────────────────────────────────
// Each channel has an array of log files.
// "label" is the display name for the log pill.
const CHANNELS = [
  {
    id: 'general',
    name: 'general',
    logs: [
      { label: 'Aug 2025', url: 'https://raw.githubusercontent.com/BR3XALITYalt/teamsauce/refs/heads/main/general/general_2025-08.json' }
    ]
  },
  {
    id: 'scripts',
    name: 'scripts',
    logs: [
      { label: 'Jul 2025', url: 'https://raw.githubusercontent.com/BR3XALITYalt/teamsauce/refs/heads/main/scripts/scripts_2025-07.json' },
      { label: 'Aug 2025', url: 'https://raw.githubusercontent.com/BR3XALITYalt/teamsauce/refs/heads/main/scripts/scripts_2025-08.json' }
    ]
  },
  {
    id: 'ai',
    name: 'ai',
    logs: [
      { label: 'Jul 2025', url: 'https://raw.githubusercontent.com/BR3XALITYalt/teamsauce/refs/heads/main/ai/general_2025-07.json' }
    ]
  },
  {
    id: 'smash-dih2',
    name: 'dih2',
    logs: [
      { label: 'Aug 2025', url: 'https://raw.githubusercontent.com/BR3XALITYalt/teamsauce/refs/heads/main/Smash-dih2/dih2_2025-08.json' },
      { label: 'Sep 2025', url: 'https://raw.githubusercontent.com/BR3XALITYalt/teamsauce/refs/heads/main/Smash-dih2/dih2_2025-09.json' },
      { label: 'Oct 2025', url: 'https://raw.githubusercontent.com/BR3XALITYalt/teamsauce/refs/heads/main/Smash-dih2/dih2_2025-10.json' }
    ]
  }
];

// ── State ──────────────────────────────────────────────────────────────────────
let activeChannel = null;
let activeLog = null;
const cache = {}; // url → parsed data

// ── Avatar colors ──────────────────────────────────────────────────────────────
const COLORS = ['#5865f2','#ed4245','#3ba55c','#faa61a','#eb459e','#00b0f4','#f47fff','#1abc9c','#e67e22','#9b59b6'];
const userColors = {}, userNames = {
  '4PV9rWMm': 'BR3XALITY',
  'mRwJzylA': 'MangoPhonkSigma',
  '4v6g3vJ4': 'GPTbot',
  '4ZE2GE7A': 'Dylan',
  'AelGaRWm': 'RubenSim'
};
let colorIdx = 0;
function getColor(uid) {
  if (!userColors[uid]) userColors[uid] = COLORS[colorIdx++ % COLORS.length];
  return userColors[uid];
}
function displayName(uid) { return userNames[uid] || uid.slice(0,8); }

// ── Sidebar build ──────────────────────────────────────────────────────────────
function buildSidebar() {
  const container = document.getElementById('sidebar-content');
  container.innerHTML = '';

  // Group channels by "category" — here we just use the folder/id prefix
  // Smash- prefix gets its own category, rest go under "Text Channels"
  const cats = { 'Text Channels': [], 'Smash': [] };
  CHANNELS.forEach(ch => {
    if (ch.id.startsWith('smash')) cats['Smash'].push(ch);
    else cats['Text Channels'].push(ch);
  });

  for (const [catName, channels] of Object.entries(cats)) {
    if (!channels.length) continue;
    const cat = document.createElement('div');
    cat.className = 'channel-category';
    cat.textContent = catName;
    container.appendChild(cat);

    channels.forEach(ch => {
      const item = document.createElement('div');
      item.className = 'channel-item';
      item.dataset.id = ch.id;
      item.innerHTML = `<span class="hash">#</span><span class="ch-name">${ch.name}</span>`;
      item.addEventListener('click', () => selectChannel(ch));
      container.appendChild(item);

      // Log pills
      const pills = document.createElement('div');
      pills.className = 'log-pills';
      pills.dataset.chId = ch.id;
      ch.logs.forEach(log => {
        const pill = document.createElement('div');
        pill.className = 'log-pill';
        pill.textContent = log.label;
        pill.dataset.url = log.url;
        pill.addEventListener('click', (e) => {
          e.stopPropagation();
          selectLog(ch, log, pill);
        });
        pills.appendChild(pill);
      });
      container.appendChild(pills);
    });
  }
}

function selectChannel(ch) {
  // Deselect all
  document.querySelectorAll('.channel-item').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.log-pills').forEach(el => el.classList.remove('open'));

  // Select this channel
  const item = document.querySelector(`.channel-item[data-id="${ch.id}"]`);
  if (item) item.classList.add('active');
  const pills = document.querySelector(`.log-pills[data-ch-id="${ch.id}"]`);
  if (pills) pills.classList.add('open');

  activeChannel = ch;

  // If only one log, auto-load it
  if (ch.logs.length === 1) {
    const pill = pills?.querySelector('.log-pill');
    selectLog(ch, ch.logs[0], pill);
  } else {
    // Show prompt to pick a log
    document.getElementById('tb-channel').textContent = ch.name;
    document.getElementById('tb-log').textContent = `${ch.logs.length} logs available`;
    document.getElementById('tb-badge').textContent = '';
    document.getElementById('fake-input-text').textContent = `Message #${ch.name} (read-only archive)`;
    document.getElementById('messages').innerHTML = `
      <div id="loading">
        <span style="font-size:2rem">📂</span>
        <span>Select a log period from the sidebar</span>
      </div>`;
  }
}

function selectLog(ch, log, pillEl) {
  // Deselect all pills
  document.querySelectorAll('.log-pill').forEach(p => p.classList.remove('active'));
  if (pillEl) pillEl.classList.add('active');

  activeLog = log;
  document.getElementById('tb-channel').textContent = ch.name;
  document.getElementById('tb-log').textContent = log.label;
  document.getElementById('tb-badge').textContent = '';
  document.getElementById('fake-input-text').textContent = `Message #${ch.name} (read-only archive)`;

  if (cache[log.url]) {
    renderMessages(cache[log.url]);
  } else {
    showLoading();
    fetch(log.url)
      .then(r => { if (!r.ok) throw new Error(`HTTP ${r.status}`); return r.json(); })
      .then(data => { cache[log.url] = data; renderMessages(data); })
      .catch(err => showError(err.message));
  }
}

// ── Render ─────────────────────────────────────────────────────────────────────
function showLoading() {
  document.getElementById('messages').innerHTML = `
    <div id="loading"><div class="spinner"></div><span>Fetching log…</span></div>`;
}
function showError(msg) {
  document.getElementById('messages').innerHTML = `
    <div id="loading">
      <span style="font-size:2rem">⚠️</span>
      <span>Failed: ${escHtml(msg)}</span>
    </div>`;
}

function extractNames(msgs) {
  msgs.forEach(m => {
    const jm = m.content_plaintext?.match(/^@(\S+) has joined/);
    if (jm) userNames[m.createdBy] = jm[1];
  });
}

function fmtTime(ts) {
  return new Date(ts).toLocaleTimeString('en-US', { hour:'2-digit', minute:'2-digit', hour12:true });
}
function fmtFull(ts) {
  const d = new Date(ts);
  return d.toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'}) + ' at ' + fmtTime(ts);
}
function fmtDateSep(ts) {
  return new Date(ts).toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'});
}
function sameDay(a, b) {
  const da = new Date(a), db = new Date(b);
  return da.getFullYear()===db.getFullYear() && da.getMonth()===db.getMonth() && da.getDate()===db.getDate();
}

function parseContent(raw) {
  if (!raw) return { html: '', images: [] };
  const images = [];
  let text = raw.replace(/!\[([^\]]*)\]\(([^)]+)\)/g, (_, _alt, url) => { images.push(url); return ''; });
  // linkify
  text = text.replace(/(https?:\/\/[^\s<>"]+)/g, '<a href="$1" target="_blank" rel="noopener">$1</a>');
  // @mention
  text = text.replace(/@([A-Za-z0-9_]+)/g, '<span class="mention">@$1</span>');
  // #channel
  text = text.replace(/#([A-Za-z0-9_-]+)/g, '<span class="ch-ref">#$1</span>');
  return { html: text.trim(), images };
}

function attHtml(attachments, inlineImages) {
  const urls = [...(inlineImages||[])];
  (attachments||[]).forEach(a => { if (!urls.includes(a.url)) urls.push(a.url); });
  if (!urls.length) return '';
  return `<div class="att-grid">${urls.map(u =>
    `<img src="${u.replace(/"/g,'&quot;')}" loading="lazy" alt="attachment" onclick="openLightbox(this.src)">`
  ).join('')}</div>`;
}

function isSystem(m) {
  return m.content_plaintext?.includes('has joined') || m.content_plaintext?.includes('has left') || m.type==='system';
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function renderMessages(data) {
  const msgs = data.messages || [];
  extractNames(msgs);

  document.getElementById('tb-badge').textContent = `${msgs.length} messages`;

  const container = document.getElementById('messages');
  const frag = document.createDocumentFragment();

  let lastUser = null, lastDay = null, lastTs = null;
  const GROUP_MS = 7 * 60 * 1000;

  msgs.forEach(msg => {
    if (!lastDay || !sameDay(msg.timestamp, lastDay)) {
      const sep = document.createElement('div');
      sep.className = 'date-sep';
      sep.textContent = fmtDateSep(msg.timestamp);
      frag.appendChild(sep);
      lastUser = null;
    }
    lastDay = msg.timestamp;

    // System message
    if (isSystem(msg)) {
      const el = document.createElement('div');
      el.className = 'msg-sys';
      el.innerHTML = `<span>👋</span><span>${escHtml(msg.content_plaintext||msg.content)}</span><span class="sys-ts">${fmtTime(msg.timestamp)}</span>`;
      frag.appendChild(el);
      lastUser = null;
      return;
    }

    const timeDiff = lastTs ? new Date(msg.timestamp)-new Date(lastTs) : Infinity;
    const newGroup = msg.createdBy !== lastUser || timeDiff > GROUP_MS;
    const { html, images } = parseContent(msg.content);
    const atts = attHtml(msg.attachments, images);

    if (newGroup) {
      const color = getColor(msg.createdBy);
      const name = displayName(msg.createdBy);
      const el = document.createElement('div');
      el.className = 'msg-group';
      el.innerHTML = `
        <div class="avatar" style="background:${color}">${name[0].toUpperCase()}</div>
        <div style="flex:1;min-width:0">
          <div class="msg-header">
            <span class="author" style="color:${color}">${escHtml(name)}</span>
            <span class="ts">${fmtFull(msg.timestamp)}</span>
          </div>
          <div class="msg-body">${html}</div>
          ${atts}
        </div>`;
      frag.appendChild(el);
    } else {
      const el = document.createElement('div');
      el.className = 'msg-cont';
      el.innerHTML = `<span class="ts-small">${fmtTime(msg.timestamp)}</span><div class="msg-body">${html}</div>${atts}`;
      frag.appendChild(el);
    }

    lastUser = msg.createdBy;
    lastTs = msg.timestamp;
  });

  container.innerHTML = '';
  container.appendChild(frag);
  container.scrollTop = container.scrollHeight;

  // Jump button
  container.onscroll = () => {
    const dist = container.scrollHeight - container.scrollTop - container.clientHeight;
    document.getElementById('jump-btn').classList.toggle('visible', dist > 300);
  };
}

function jumpToBottom() {
  const c = document.getElementById('messages');
